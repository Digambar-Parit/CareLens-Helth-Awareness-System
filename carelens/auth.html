<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareLens Auth</title>
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
  <link rel="stylesheet" href="css/global-theme.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-container {
      max-width: 450px;
      margin: 80px auto;
      padding: 40px;
    }
    .auth-tabs {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }
    .auth-tab {
      cursor: pointer;
      font-weight: 600;
      opacity: 0.5;
      transition: 0.3s;
      color: var(--text-main);
    }
    .auth-tab.active {
      opacity: 1;
      border-bottom: 2px solid var(--primary);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: var(--text-soft);
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-white);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      color: var(--text-main);
      outline: none;
      transition: 0.3s;
    }
    .form-group input:focus {
      border-color: var(--primary);
      background: var(--bg-white);
    }
    .hidden { display: none; }
  </style>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <nav>
    <div class="navbar">
      <a href="index.html" class="logo" aria-label="CareLens Home" style="display: flex; align-items: center; gap: 8px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-heart-pulse" style="color: var(--primary);"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M3.22 12H9.5l1.5-3 2 6 1.5-3h3.16"/></svg>
        <span style="font-weight: 700; color: var(--text-main);">CareLens AI</span>
      </a>

      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="detection.html">Detection</a>
        <a href="reports.html">Reports</a>
        <a href="reminders.html">Reminders</a>
        <a href="history.html">History</a>
        <a href="nearby.html">Nearby</a>
      </div>

      <div class="nav-actions">
        <a href="emergency.html" class="btn" style="padding: 10px 20px; background: var(--danger); border-color: transparent;">SOS</a>
      </div>

      <button class="menu-toggle" data-menu-toggle aria-label="Toggle Navigation">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-menu"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Mobile Dropdown Navigation -->
    <div class="mobile-menu" data-mobile-menu>
      <div class="mobile-menu-links">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="detection.html">Detection</a>
        <a href="reports.html">Reports</a>
        <a href="reminders.html">Reminders</a>
        <a href="history.html">History</a>
        <a href="nearby.html">Nearby</a>
        <a href="emergency.html" style="color: var(--danger); font-weight: bold;">SOS</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="glass-card auth-container" data-aos="zoom-in">
      <div class="auth-tabs">
        <div id="loginTab" class="auth-tab active">Login</div>
        <div id="signupTab" class="auth-tab">Signup</div>
      </div>

      <div id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="name@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" />
        </div>
        <button class="btn" style="width: 100%;" id="loginBtn">Log In</button>
      </div>

      <div id="signupForm" class="hidden">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="John Doe" />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="signupEmail" placeholder="name@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="••••••••" />
        </div>
        <button class="btn" style="width: 100%;" id="signupBtn">Create Account</button>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/lucide.min.js"></script>
  <script src="js/api.js"></script>
  <script>
    AOS.init();
    
    const loginTab = document.getElementById('loginTab');
    const signupTab = document.getElementById('signupTab');
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');

    loginTab.onclick = () => {
      loginTab.classList.add('active');
      signupTab.classList.remove('active');
      loginForm.classList.remove('hidden');
      signupForm.classList.add('hidden');
    };

    signupTab.onclick = () => {
      signupTab.classList.add('active');
      loginTab.classList.remove('active');
      signupForm.classList.remove('hidden');
      loginForm.classList.add('hidden');
    };

    document.getElementById('loginBtn').onclick = async () => {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const data = await api.post('/auth/login', { email, password });
      if (data.token) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';
      } else {
        alert(data.error);
      }
    };

    document.getElementById('signupBtn').onclick = async () => {
      const name = document.getElementById('signupName').value;
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const data = await api.post('/auth/register', { name, email, password });
      if (data.token) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';
      } else {
        alert(data.error);
      }
    };
  </script>
  <script src="js/app.js"></script>
</body>
</html>
