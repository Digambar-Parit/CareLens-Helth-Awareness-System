<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareLens Auth</title>
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-container {
      max-width: 450px;
      margin: 80px auto;
      padding: 40px;
    }
    .auth-tabs {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }
    .auth-tab {
      cursor: pointer;
      font-weight: 600;
      opacity: 0.5;
      transition: 0.3s;
    }
    .auth-tab.active {
      opacity: 1;
      border-bottom: 2px solid var(--cyan);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--cyan);
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <nav>
    <div class="navbar container">
      <a href="index.html" class="logo btn secondary-btn">CareLens</a>
    </div>
  </nav>

  <main>
    <div class="glass-card auth-container" data-aos="zoom-in">
      <div class="auth-tabs">
        <div id="loginTab" class="auth-tab active">Login</div>
        <div id="signupTab" class="auth-tab">Signup</div>
      </div>

      <div id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="name@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" />
        </div>
        <button class="btn" style="width: 100%;" id="loginBtn">Log In</button>
      </div>

      <div id="signupForm" class="hidden">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="John Doe" />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="signupEmail" placeholder="name@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="••••••••" />
        </div>
        <button class="btn" style="width: 100%;" id="signupBtn">Create Account</button>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/lucide.min.js"></script>
  <script src="js/api.js"></script>
  <script>
    AOS.init();
    
    const loginTab = document.getElementById('loginTab');
    const signupTab = document.getElementById('signupTab');
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');

    loginTab.onclick = () => {
      loginTab.classList.add('active');
      signupTab.classList.remove('active');
      loginForm.classList.remove('hidden');
      signupForm.classList.add('hidden');
    };

    signupTab.onclick = () => {
      signupTab.classList.add('active');
      loginTab.classList.remove('active');
      signupForm.classList.remove('hidden');
      loginForm.classList.add('hidden');
    };

    document.getElementById('loginBtn').onclick = async () => {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const data = await api.post('/auth/login', { email, password });
      if (data.token) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';
      } else {
        alert(data.error);
      }
    };

    document.getElementById('signupBtn').onclick = async () => {
      const name = document.getElementById('signupName').value;
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const data = await api.post('/auth/register', { name, email, password });
      if (data.token) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';
      } else {
        alert(data.error);
      }
    };
  </script>
</body>
</html>
